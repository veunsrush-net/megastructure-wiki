<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратный отсчёт до Земли — Хроники Мегаструктуры</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #14120f;
    --bg-void: #0a0908;
    --panel: #1e1b16;
    --panel-2: #262019;
    --rust: #b5502e;
    --rust-dim: #7a3a22;
    --amber: #d9a441;
    --toxic: #6e7a4a;
    --text: #e8e1d3;
    --text-muted: #8c8474;
    --border: rgba(181,80,46,0.28);
    --border-soft: rgba(232,225,211,0.08);
    --font-display: 'Oswald', sans-serif;
    --font-body: 'IBM Plex Mono', monospace;
  }
  html[data-theme="light"]{
    --bg: #f1ece0;
    --bg-void: #e7ded0;
    --panel: #fbf8f0;
    --panel-2: #f0e9d8;
    --rust: #a8461f;
    --rust-dim: #c47a55;
    --amber: #93611a;
    --toxic: #556534;
    --text: #241f18;
    --text-muted: #6e6455;
    --border: rgba(168,70,31,0.3);
    --border-soft: rgba(36,31,24,0.1);
  }
  html{ transition: background-color 0.3s ease; }
  body{ transition: background-color 0.3s ease, color 0.3s ease; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior: smooth; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top left, rgba(181,80,46,0.06), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(110,122,74,0.05), transparent 50%);
    background-size: 140% 140%, 140% 140%;
    animation: driftGlow 26s ease-in-out infinite;
  }
  @keyframes driftGlow{
    0%,100%{ background-position: 0% 0%, 100% 100%; }
    50%{ background-position: 20% 15%, 80% 85%; }
  }
  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(14px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn{
    from{ opacity: 0; }
    to{ opacity: 1; }
  }
  @keyframes pulseGlow{
    0%,100%{ opacity: 0.55; }
    50%{ opacity: 1; }
  }
  @keyframes shimmer{
    0%{ background-position: -200px 0; }
    100%{ background-position: 200px 0; }
  }
  ::selection{ background: var(--rust); color: var(--bg); }
  a{ color: inherit; }
  ::-webkit-scrollbar{ width: 10px; height: 10px; }
  ::-webkit-scrollbar-track{ background: var(--bg-void); }
  ::-webkit-scrollbar-thumb{ background: var(--rust-dim); border-radius: 6px; transition: background 0.25s; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--rust); }

  #scene{
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #scene.scene-fading{
    opacity: 0;
    transform: translateY(10px);
  }

  /* ---------- layout shell ---------- */
  .app{
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 860px){
    .app{ grid-template-columns: 1fr; }
    .sidebar{ position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  }

  /* ---------- sidebar ---------- */
  .sidebar{
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 22px 18px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .sidebar-scroll{
    flex: 1 1 auto;
    overflow-y: auto;
    min-height: 0;
  }
  .brand{
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.04em;
    font-size: 20px;
    text-transform: uppercase;
    color: var(--amber);
    line-height: 1.15;
    cursor: pointer;
  }
  .brand span{ display:block; font-size: 10px; color: var(--text-muted); font-family: var(--font-body); letter-spacing: 0.18em; margin-top: 4px; }

  .hazard{
    height: 6px;
    margin: 16px 0;
    border-radius: 1px;
    overflow: hidden;
    position: relative;
    opacity: 0.55;
  }
  .hazard::before{
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 200%;
    height: 100%;
    background: repeating-linear-gradient(135deg, var(--amber) 0 10px, var(--bg-void) 10px 20px);
    will-change: transform;
    animation: hazardMove 6s linear infinite;
  }
  @keyframes hazardMove{
    from{ transform: translate3d(-28px, 0, 0); }
    to{ transform: translate3d(0, 0, 0); }
  }
  .sidebar{ animation: fadeIn 0.6s ease both; }
  .brand{ transition: color 0.25s, text-shadow 0.25s; }
  .brand:hover{ text-shadow: 0 0 14px rgba(217,164,65,0.55); }

  .search-box{
    width: 100%;
    background: var(--bg-void);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 12.5px;
    padding: 9px 10px;
    letter-spacing: 0.02em;
  }
  .search-box{ transition: border-color 0.25s, box-shadow 0.25s; }
  .search-box:focus{ outline: none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(181,80,46,0.15); }
  .search-box::placeholder{ color: var(--text-muted); }

  .nav-group{ margin-top: 22px; }
  .nav-group-title{
    font-family: var(--font-display);
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .nav-group-title::after{
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-soft);
  }
  .nav-item{
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 8px 7px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    line-height: 1.4;
  }
  .nav-item{ transition: color 0.2s, background 0.2s, border-left-color 0.2s, padding-left 0.2s; }
  .nav-item:hover{ color: var(--text); background: rgba(232,225,211,0.03); padding-left: 18px; }
  .nav-item.active{
    color: var(--amber);
    border-left-color: var(--rust);
    background: rgba(181,80,46,0.08);
    animation: fadeIn 0.3s ease;
    position: relative;
  }
  .nav-item.active::before{
    content: '▸';
    position: absolute;
    left: -2px;
    color: var(--rust);
    animation: pulseGlow 1.8s ease-in-out infinite;
  }
  .nav-item small{ display:block; color: var(--text-muted); font-size: 10.5px; margin-top: 2px; }
  .search-hit{ background: rgba(217,164,65,0.3); color: var(--amber); border-radius: 2px; padding: 0 1px; }

  /* ---------- reading progress bar ---------- */
  .progress-bar{
    position: fixed; top: 0; left: 0; height: 3px; width: 0%;
    background: var(--rust); z-index: 60;
    box-shadow: 0 0 8px rgba(181,80,46,0.6);
    transition: width 0.1s linear;
  }
  @media (max-width: 860px){ .progress-bar{ top: 52px; } }

  /* ---------- breadcrumbs ---------- */
  .breadcrumbs{
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    font-family: var(--font-body); font-size: 11.5px; color: var(--text-muted);
    margin-bottom: 18px; animation: fadeIn 0.4s ease both;
  }
  .breadcrumbs button{
    background: none; border: none; color: var(--text-muted); font: inherit; cursor: pointer;
    padding: 0; transition: color 0.2s;
  }
  .breadcrumbs button:hover{ color: var(--amber); }
  .breadcrumbs .crumb-sep{ color: var(--rust-dim); }
  .breadcrumbs .crumb-current{ color: var(--text); }

  /* ---------- back to top ---------- */
  .to-top-btn{
    position: fixed; right: 22px; bottom: 22px; z-index: 55;
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--amber); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s, background 0.2s, border-color 0.2s;
  }
  .to-top-btn.visible{ opacity: 1; pointer-events: auto; transform: translateY(0); }
  .to-top-btn:hover{ background: var(--panel-2); border-color: var(--rust); }
  @media (max-width: 600px){ .to-top-btn{ right: 14px; bottom: 14px; width: 38px; height: 38px; } }

  /* ---------- stats row ---------- */
  .stats-row{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-soft);
    border: 1px solid var(--border-soft);
    margin-top: 32px;
  }
  @media (max-width: 640px){ .stats-row{ grid-template-columns: repeat(3, 1fr); } }
  .stat-box{
    background: var(--bg);
    padding: 16px 14px;
    text-align: center;
  }
  .stat-num{
    font-family: var(--font-display); font-weight: 700; font-size: clamp(22px, 3.5vw, 32px);
    color: var(--amber); letter-spacing: 0.02em;
  }
  .stat-lbl{
    margin-top: 4px; font-size: 10.5px; letter-spacing: 0.06em; color: var(--text-muted);
    text-transform: uppercase; line-height: 1.4;
  }

  /* ---------- void easter egg ---------- */
  .void-caption{ transition: color 0.2s, text-shadow 0.2s; }
  .void-caption:hover{ color: var(--rust); text-shadow: 0 0 8px rgba(181,80,46,0.5); }
  .lore-toast{
    position: fixed; left: 50%; bottom: 26px; z-index: 70;
    transform: translate(-50%, 16px); opacity: 0;
    background: var(--panel); border: 1px solid var(--rust-dim);
    max-width: 420px; width: calc(100% - 36px);
    padding: 14px 16px; box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .lore-toast.visible{ opacity: 1; transform: translate(-50%, 0); }
  .lore-toast-tag{
    font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--rust); margin-bottom: 6px;
  }
  .lore-toast-text{ font-size: 12.5px; line-height: 1.6; color: var(--text); }

  /* ---------- glossary status tags ---------- */
  .lost-tag{
    display: inline-block; font-family: var(--font-display); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 1px 7px;
    border-radius: 2px; margin-left: 2px; vertical-align: 1px;
  }
  .lost-tag--утеряно{ color: var(--rust); border: 1px solid var(--rust-dim); background: rgba(181,80,46,0.08); }
  .lost-tag--искажено{ color: var(--toxic); border: 1px solid var(--toxic); background: rgba(110,122,74,0.1); }

  /* ---------- sidebar toolbar ---------- */
  .toolbar-row{ display: flex; gap: 8px; margin: 14px 0; }
  .tool-btn{
    flex: 1; background: var(--bg-void); border: 1px solid var(--border-soft);
    color: var(--text-muted); font-size: 15px; padding: 8px 0; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .tool-btn:hover{ color: var(--amber); border-color: var(--rust); transform: translateY(-1px); }
  .tool-btn.active{ color: var(--amber); border-color: var(--rust); background: rgba(181,80,46,0.08); }

  /* ---------- reading mode ---------- */
  body.reading-mode .sidebar{ display: none; }
  body.reading-mode .mobile-bar{ display: none; }
  body.reading-mode .app{ grid-template-columns: 1fr; }
  body.reading-mode .scene{ max-width: 720px; padding-top: 64px; }
  .exit-reading-btn{
    position: fixed; top: 18px; right: 18px; z-index: 55;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text-muted); font-family: var(--font-display); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 14px; cursor: pointer;
    display: none; align-items: center; gap: 6px;
    transition: color 0.2s, border-color 0.2s;
  }
  .exit-reading-btn:hover{ color: var(--amber); border-color: var(--rust); }
  body.reading-mode .exit-reading-btn{ display: flex; }

  /* ---------- bookmarks ---------- */
  .bookmark-star{
    background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1;
    color: var(--text-muted); transition: color 0.2s, transform 0.15s; padding: 0 0 0 8px;
    vertical-align: -2px;
  }
  .bookmark-star:hover{ transform: scale(1.15); }
  .bookmark-star.active{ color: var(--amber); }
  .print-btn{
    background: none; border: none; cursor: pointer; line-height: 1;
    color: var(--text-muted); transition: color 0.2s, transform 0.15s, filter 0.2s;
    padding: 0 0 0 10px; vertical-align: -3px;
    display: inline-flex; align-items: center;
  }
  .print-btn svg{ display: block; }
  .print-btn:hover{ color: var(--amber); transform: scale(1.12); filter: drop-shadow(0 0 4px rgba(217,164,65,0.45)); }
  .print-btn:active{ transform: scale(0.96); }

  .add-btn{
    margin-top: 14px;
    flex-shrink: 0;
    width: 100%;
    background: var(--bg-void);
    border: 1px dashed var(--border);
    color: var(--amber);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
  }
  .add-btn{ transition: background 0.25s, border-color 0.25s, transform 0.15s; }
  .add-btn:hover{ background: rgba(181,80,46,0.08); border-style: solid; transform: translateY(-1px); }
  .add-btn:active{ transform: translateY(0); }

  .auth-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 10px;
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .auth-link{
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 11.5px;
    letter-spacing: 0.03em;
    cursor: pointer;
    text-decoration: underline dotted;
    padding: 2px 0;
  }
  .auth-link:hover{ color: var(--amber); }
  .auth-status{
    font-size: 11px;
    color: var(--toxic);
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .auth-error{
    color: var(--rust);
    font-size: 11.5px;
    margin-top: -8px;
    margin-bottom: 14px;
    display: none;
  }
  .auth-error.show{ display: block; }

  /* ---------- main ---------- */
  .main{ padding: 0; min-width: 0; }
  .scene{ max-width: 880px; margin: 0 auto; padding: 48px 40px 100px; }
  @media (max-width: 600px){ .scene{ padding: 32px 18px 80px; } }

  /* ---------- hero / landing ---------- */
  .hero-eyebrow{
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--rust);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.02;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .hero-title{ animation: fadeUp 0.6s ease both; }
  .hero-title em{ font-style: normal; color: var(--amber); text-shadow: 0 0 24px rgba(217,164,65,0.25); }
  .hero-sub{
    margin-top: 18px;
    max-width: 60ch;
    color: var(--text-muted);
    font-size: 14.5px;
    line-height: 1.75;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .cross-section{ margin: 44px 0 8px; }
  .cross-section svg{ width: 100%; height: auto; display:block; }
  .cs-caption{
    display:flex; justify-content: space-between;
    font-size: 10.5px; letter-spacing: 0.1em; color: var(--text-muted);
    text-transform: uppercase; margin-top: 10px;
  }

  .hero-grid{
    margin-top: 46px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-soft);
    border: 1px solid var(--border-soft);
  }
  @media (max-width: 640px){ .hero-grid{ grid-template-columns: 1fr; } }
  .hero-card{
    background: var(--bg);
    padding: 20px;
    cursor: pointer;
    transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.55s ease both;
  }

  /* ---------- district map ---------- */
  .district-map-wrap svg{ width:100%; height:auto; display:block; }
  .district-shape{
    cursor: pointer;
    transition: fill 0.2s, stroke 0.2s, stroke-width 0.2s, filter 0.2s;
  }
  .district-shape:hover, .district-shape.active{
    filter: brightness(1.35);
  }
  .district-label{
    pointer-events: none;
    font-family: var(--font-display);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    fill: var(--text);
    opacity: 0.9;
  }
  .district-sub{
    pointer-events: none;
    font-family: var(--font-body);
    fill: var(--text-muted);
  }
  .district-info{
    margin-top: 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 16px 18px;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: border-color 0.25s;
  }
  .district-info.has-selection{ border-color: var(--rust); }
  .district-info .di-placeholder{
    color: var(--text-muted);
    font-size: 12.5px;
    letter-spacing: 0.03em;
  }
  .district-info .di-head{
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
    animation: fadeIn 0.25s ease;
  }
  .district-info .di-name{
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--amber);
  }
  .district-info .di-kind{
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .district-info .di-desc{
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    opacity: 0.92;
    animation: fadeIn 0.3s ease;
  }
  .district-info .di-link{
    margin-top: 10px;
    display: inline-block;
    width: fit-content;
    background: none;
    border: none;
    border-bottom: 1px solid var(--rust-dim);
    color: var(--amber);
    font-family: var(--font-body);
    font-size: 11.5px;
    letter-spacing: 0.05em;
    padding: 2px 0;
    cursor: pointer;
  }
  .district-info .di-link:hover{ border-bottom-color: var(--amber); }
  .hero-card:nth-child(1){ animation-delay: 0.05s; }
  .hero-card:nth-child(2){ animation-delay: 0.15s; }
  .hero-card:nth-child(3){ animation-delay: 0.25s; }
  .hero-card:hover{ background: var(--panel-2); transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.35); }
  .hero-card .k{ font-family: var(--font-display); font-size: 10.5px; letter-spacing: 0.14em; color: var(--rust); text-transform: uppercase; }
  .hero-card .t{ font-family: var(--font-display); font-size: 17px; margin-top: 8px; color: var(--text); text-transform: uppercase; transition: color 0.2s; }
  .hero-card:hover .t{ color: var(--amber); }
  .hero-card .d{ font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }

  /* ---------- article ---------- */
  .article-meta{
    display:flex; align-items:center; gap: 10px;
    font-family: var(--font-display); font-size: 11.5px; letter-spacing: 0.14em;
    color: var(--rust); text-transform: uppercase; margin-bottom: 14px;
  }
  .article-meta .dot{ width:4px; height:4px; background: var(--text-muted); border-radius:50%; }
  .article-meta{ animation: fadeUp 0.4s ease both; }
  .article-title{
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase;
    font-size: clamp(28px, 4.5vw, 42px); line-height: 1.05; color: var(--text);
    animation: fadeUp 0.45s ease 0.05s both;
  }
  .article-summary{
    margin-top: 16px; font-size: 14.5px; color: var(--amber); line-height: 1.7;
    border-left: 2px solid var(--rust); padding-left: 16px;
    animation: fadeUp 0.45s ease 0.1s both;
  }

  .infobox{
    float: right;
    width: 220px;
    margin: 6px 0 20px 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    animation: fadeIn 0.6s ease 0.15s both;
  }
  @media (max-width: 700px){ .infobox{ float:none; width:auto; margin: 24px 0; } }
  .infobox-head{
    background: var(--panel-2); padding: 10px 14px;
    font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--amber);
  }
  .infobox-row{ padding: 9px 14px; border-top: 1px solid var(--border-soft); font-size: 12px; }
  .infobox-row .lbl{ color: var(--text-muted); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }

  .article-body{
    margin-top: 8px; font-size: 14.5px; line-height: 1.85; color: var(--text);
  }
  .article-body p{ margin-bottom: 18px; }
  .wiki-link{
    color: var(--amber); text-decoration: none; border-bottom: 1px dotted var(--rust);
    cursor: pointer; background: none; font: inherit; padding: 0;
    transition: color 0.2s, border-bottom-color 0.2s;
    position: relative;
    display: inline-block;
  }
  .wiki-link:hover{ color: var(--rust); border-bottom-style: solid; animation: linkGlitch 0.35s steps(2, end); }
  @keyframes linkGlitch{
    0%{ transform: translate(0,0); text-shadow: none; }
    20%{ transform: translate(-1px, 0.5px); text-shadow: 1px 0 var(--toxic), -1px 0 var(--rust); }
    40%{ transform: translate(1px, -0.5px); text-shadow: -1px 0 var(--toxic), 1px 0 var(--rust); }
    60%{ transform: translate(-1px, 0); text-shadow: 1px 0 var(--rust); }
    80%{ transform: translate(0.5px, 0.5px); text-shadow: none; }
    100%{ transform: translate(0,0); text-shadow: none; }
  }

  .see-also{ margin-top: 40px; clear: both; }
  .see-also-title{
    font-family: var(--font-display); font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
  }
  .chip-row{ display:flex; flex-wrap: wrap; gap: 8px; }
  .chip{
    background: var(--panel); border: 1px solid var(--border-soft);
    color: var(--text); font-size: 12px; padding: 7px 12px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .chip:hover{ border-color: var(--rust); color: var(--amber); transform: translateY(-2px); }

  .custom-tag{
    display:inline-block; margin-left: 10px; font-size: 9.5px; letter-spacing: 0.1em;
    color: var(--toxic); border: 1px solid var(--toxic); padding: 2px 6px; text-transform: uppercase;
  }
  .del-btn{
    background: none; border: 1px solid var(--rust-dim); color: var(--rust);
    font-family: var(--font-body); font-size: 11.5px; padding: 8px 14px; cursor: pointer;
  }
  .del-btn{ transition: background 0.2s, transform 0.15s; }
  .del-btn:hover{ background: rgba(181,80,46,0.1); transform: translateY(-1px); }
  .article-owner-actions{ margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
  .article-owner-actions .btn{
    background: none; border: 1px solid var(--border); color: var(--text);
    font-family: var(--font-body); font-size: 11.5px; padding: 8px 14px; cursor: pointer;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .article-owner-actions .btn:hover{ border-color: var(--amber); color: var(--amber); transform: translateY(-1px); }
  .article-inline-img{
    display: block; max-width: 100%; height: auto; margin: 18px 0;
    border: 1px solid var(--border-soft);
  }
  .img-insert-row{ display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .img-insert-row .btn{ font-size: 11.5px; padding: 6px 10px; }
  .img-upload-status{ font-size: 11px; color: var(--text-muted); }

  /* ---------- modal ---------- */
  .modal-overlay{
    position: fixed; inset: 0; background: rgba(10,9,8,0.78);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 18px; overflow-y: auto; z-index: 50;
  }
  .modal-overlay.open{ display: flex; animation: fadeIn 0.2s ease; }
  .modal{
    background: var(--panel); border: 1px solid var(--border); max-width: 560px; width: 100%;
    animation: fadeUp 0.3s ease;
  }
  .modal-head{
    padding: 18px 22px; border-bottom: 1px solid var(--border-soft);
    display:flex; justify-content: space-between; align-items:center;
  }
  .modal-head h3{
    font-family: var(--font-display); font-size: 16px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--amber);
  }
  .modal-close{ background:none; border:none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; transition: color 0.2s, transform 0.2s; }
  .modal-close:hover{ color: var(--text); transform: rotate(90deg); }
  .modal-body{ padding: 20px 22px; }
  .field{ margin-bottom: 16px; }
  .field label{
    display:block; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 7px;
  }
  .field input, .field select, .field textarea{
    width: 100%; background: var(--bg-void); border: 1px solid var(--border-soft);
    color: var(--text); font-family: var(--font-body); font-size: 13px; padding: 9px 10px;
  }
  .field input, .field select, .field textarea{ transition: border-color 0.2s, box-shadow 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color: var(--rust); box-shadow: 0 0 0 3px rgba(181,80,46,0.12); }
  .field textarea{ min-height: 130px; resize: vertical; line-height: 1.6; }
  .modal-actions{ display:flex; justify-content:flex-end; gap: 10px; margin-top: 6px; }
  .btn{
    font-family: var(--font-display); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 18px; cursor: pointer; border: 1px solid var(--border-soft); background: none; color: var(--text-muted);
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-primary{ background: var(--rust); border-color: var(--rust); color: #14120f; }
  .btn-primary:hover{ background: var(--amber); border-color: var(--amber); transform: translateY(-1px); }
  .btn:hover{ color: var(--text); transform: translateY(-1px); }
  .btn:active{ transform: translateY(0); }

  .empty-note{ color: var(--text-muted); font-size: 12.5px; padding: 6px 8px 0 14px; }

  /* ---------- mobile top bar ---------- */
  .mobile-bar{
    display: none;
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    align-items: center;
    justify-content: space-between;
  }
  @media (max-width: 860px){
    .mobile-bar{ display: flex; }
    .app{ grid-template-columns: 1fr; }
    .sidebar{
      position: fixed; top: 0; left: 0; bottom: 0; width: 300px; max-width: 90vw;
      z-index: 45; transform: translateX(-100%); transition: transform 0.28s ease;
      height: 100vh; height: 100dvh; border-right: 1px solid var(--border); border-bottom: none;
      padding-top: 64px;
    }
    .sidebar.open{ transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,0.7); }
    .main{ padding-top: 52px; }
  }
  .burger{
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px; padding: 8px;
  }
  .burger span{
    display: block; width: 22px; height: 2px; background: var(--text-muted);
    transition: all 0.2s;
  }
  .burger.active span:nth-child(1){ transform: translateY(7px) rotate(45deg); background: var(--amber); }
  .burger.active span:nth-child(2){ opacity: 0; }
  .burger.active span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); background: var(--amber); }
  .mobile-brand{
    font-family: var(--font-display); font-weight: 700; font-size: 16px;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--amber); cursor: pointer;
  }
  .sidebar-backdrop{
    display: none; position: fixed; inset: 0; z-index: 44;
    background: rgba(10,9,8,0.6);
    opacity: 0; transition: opacity 0.25s ease;
  }
  .sidebar-backdrop.open{ display: block; opacity: 1; }

  /* ---------- article banner icons (replaced images) ---------- */
  .article-banner{
    width: 100%; height: 140px; display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); margin-bottom: 28px;
    background: var(--bg-void); position: relative; overflow: hidden;
    animation: fadeIn 0.7s ease both;
  }
  .article-banner::after{
    content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(217,164,65,0.08), transparent);
    animation: bannerSweep 4.5s ease-in-out infinite;
  }
  @keyframes bannerSweep{
    0%{ left: -60%; }
    60%{ left: 120%; }
    100%{ left: 120%; }
  }
  .article-banner svg{ width: 100%; height: 100%; }
  @media (max-width: 600px){ .article-banner{ height: 110px; } }

  /* ---------- diagrams ---------- */
  .diagram-wrap{
    margin: 38px 0 8px; clear: both;
    border: 1px solid var(--border-soft);
    background: var(--bg-void);
    padding: 4px 4px 0;
  }
  .diagram-wrap svg{ width: 100%; height: auto; display: block; }
  .diagram-caption{
    font-size: 10.5px; letter-spacing: 0.12em; color: var(--text-muted);
    text-transform: uppercase; padding: 8px 10px 10px;
    border-top: 1px solid var(--border-soft); margin-top: 4px;
  }

  /* ---------- timeline in hero ---------- */
  .timeline-wrap{ margin: 48px 0 0; clear: both; }
  .timeline-wrap svg{ width: 100%; height: auto; display: block; }

  /* ---------- KR-9 mascot widget ---------- */
  .kr9-wrap{ display:flex; flex-direction:column; align-items:center; margin: 34px 0 8px; clear:both; animation: fadeUp 0.4s ease both; }
  .kr9-frame{
    width: 260px; max-width: 90vw;
    background: linear-gradient(155deg, #55483a, #2b241c 75%);
    border: 3px solid #6b5842;
    border-radius: 16px;
    padding: 20px 16px 14px;
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.35), 0 10px 26px rgba(0,0,0,0.45);
    transition: transform 0.15s ease;
  }
  html[data-theme="light"] .kr9-frame{ background: linear-gradient(155deg, #cdbfa2, #a8987a 75%); border-color: #8a7a5e; }
  .kr9-frame:active{ transform: scale(0.97); }
  .kr9-frame:focus-visible{ outline: 2px solid var(--amber); outline-offset: 3px; }
  .kr9-antenna{
    position: absolute; top: -26px; left: 24px; width: 4px; height: 28px;
    background: linear-gradient(#8a7a5e,#4a3f30); border-radius: 2px;
  }
  .kr9-antenna::after{
    content:''; position:absolute; top:-6px; left:-3px; width:10px; height:10px;
    border-radius: 50%; background: #8a7a5e; box-shadow: 0 0 6px rgba(217,164,65,0.4);
  }
  .kr9-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 10px; }
  .kr9-lens{ width:30px; height:16px; background:#161310; border:2px solid #786550; border-radius:4px; display:flex; align-items:center; justify-content:flex-end; padding-right:4px; }
  .kr9-lens-dot{ width:6px; height:6px; border-radius:50%; background: var(--rust); box-shadow: 0 0 5px var(--rust); animation: pulseGlow 2.4s ease-in-out infinite; }
  .kr9-tag{ font-family: var(--font-display); font-size: 11px; letter-spacing: 0.08em; color: #9c8a6c; opacity: 0.75; }
  .kr9-screen{
    background: #0a0806; border: 3px solid #171310; border-radius: 8px;
    height: 110px; display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.8); position:relative; overflow:hidden;
  }
  .kr9-eyes{ display:flex; gap: 26px; align-items:center; }
  .kr9-eye{
    width: 46px; height: 30px; background: var(--amber);
    box-shadow: 0 0 10px rgba(217,164,65,0.7), 0 0 22px rgba(217,164,65,0.35);
    transition: clip-path 0.15s ease, height 0.15s ease, border-radius 0.15s ease, transform 0.15s ease;
  }
  .kr9-eye--neutral{ clip-path: polygon(0% 15%, 100% 15%, 100% 55%, 55% 100%, 45% 100%, 0% 55%); }
  .kr9-eye--happy{ height: 30px; clip-path: polygon(0% 100%, 0% 45%, 12% 15%, 32% 0%, 68% 0%, 88% 15%, 100% 45%, 100% 100%); }
  .kr9-eye--surprised{ height: 40px; border-radius: 50%; clip-path: none; }
  .kr9-eye--sleepy{ height: 8px; border-radius: 4px; clip-path: none; }
  .kr9-eye--skeptical{ height: 9px; border-radius: 4px; clip-path: none; }
  .kr9-eye--skeptical:nth-child(1){ transform: rotate(-10deg) translateY(-3px); }
  .kr9-eye--skeptical:nth-child(2){ transform: rotate(10deg) translateY(3px); }
  .kr9-eye--angry{ height: 26px; clip-path: polygon(0% 100%, 100% 100%, 100% 38%, 50% 62%, 0% 38%); }
  .kr9-eye--angry:nth-child(2){ transform: scaleX(-1); }
  .kr9-eye--alarm{ height: 34px; clip-path: polygon(50% 0%, 90% 65%, 50% 42%, 10% 65%); }
  .kr9-eye--shy{ height: 10px; border-radius: 6px; clip-path: none; transform: scaleX(0.75); }
  .kr9-eye--sly{ clip-path: none; }
  .kr9-eye--sly:nth-child(1){ height: 8px; border-radius: 4px; align-self: center; }
  .kr9-eye--sly:nth-child(2){ height: 36px; width: 36px; border-radius: 50%; }
  .kr9-eye--furious{ height: 24px; background: #1a0a06; box-shadow: 0 0 12px rgba(220,40,20,0.9); clip-path: polygon(0% 100%, 100% 100%, 100% 30%, 55% 58%, 45% 58%, 0% 30%); }
  .kr9-eye--furious:nth-child(2){ transform: scaleX(-1); }

  /* ---------- KR-9 rage mode ---------- */
  @keyframes kr9RageShake{
    0%, 100%{ transform: translate(0,0) rotate(0); }
    10%{ transform: translate(-2px,1px) rotate(-1deg); }
    20%{ transform: translate(2px,-1px) rotate(1deg); }
    30%{ transform: translate(-3px,0) rotate(-1.5deg); }
    40%{ transform: translate(3px,1px) rotate(1.5deg); }
    50%{ transform: translate(-2px,-1px) rotate(-1deg); }
    60%{ transform: translate(2px,1px) rotate(1deg); }
    70%{ transform: translate(-3px,-1px) rotate(-1.5deg); }
    80%{ transform: translate(3px,0) rotate(1.5deg); }
    90%{ transform: translate(-1px,1px) rotate(-0.5deg); }
  }
  .kr9-frame.kr9-rage{ animation: kr9RageShake 0.28s linear infinite; cursor: not-allowed; }
  .kr9-frame.kr9-rage .kr9-screen{
    background: #2a0503;
    box-shadow: inset 0 0 26px rgba(255,20,10,0.55), 0 0 20px rgba(220,20,10,0.5);
  }
  @keyframes kr9RagePulse{
    0%, 100%{ background: #2a0503; }
    50%{ background: #4a0704; }
  }
  .kr9-frame.kr9-rage .kr9-screen{ animation: kr9RagePulse 0.5s ease-in-out infinite; }
  .kr9-frame.kr9-rage .kr9-lens-dot{ background:#ff2a1a; box-shadow: 0 0 8px #ff2a1a; }
  .kr9-frame.kr9-rage .kr9-led{ background:#ff2a1a; box-shadow: 0 0 8px #ff2a1a; }

  /* ---------- KR-9 silent glare mode (50% alt. reaction to spam-clicking) ---------- */
  .kr9-frame.kr9-glare{
    transform: rotate(-7deg) translate(-5px, 2px) scale(1.015);
    transition: transform 0.32s cubic-bezier(0.34,1.4,0.4,1);
    cursor: not-allowed;
  }
  .kr9-frame.kr9-glare.kr9-turn-away{ transform: rotate(20deg) translate(14px, -2px); transition: transform 0.55s ease-in; }
  .kr9-frame.kr9-glare .kr9-screen{
    background: #2a0503;
    box-shadow: inset 0 0 24px rgba(255,20,10,0.5), 0 0 16px rgba(220,20,10,0.4);
    animation: kr9RagePulse 0.9s ease-in-out infinite;
  }
  .kr9-frame.kr9-glare .kr9-lens-dot{ background:#ff2a1a; box-shadow: 0 0 8px #ff2a1a; }
  .kr9-frame.kr9-glare .kr9-led{ background:#ff2a1a; box-shadow: 0 0 8px #ff2a1a; }
  .kr9-eye--glare{ height: 7px; border-radius: 3px; background: var(--rust); box-shadow: 0 0 9px rgba(220,60,30,0.75); }
  .kr9-eye--glare:nth-child(1){ transform: rotate(-4deg); }
  .kr9-eye--glare:nth-child(2){ transform: rotate(4deg); }

  .kr9-mouth{
    position: absolute; left: 50%; bottom: 34px; transform: translateX(-50%);
    width: 74px; height: 0; overflow: visible; opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .kr9-screen.kr9-mouth-on .kr9-mouth{ opacity: 1; }
  .kr9-mouth svg{ display:block; overflow: visible; filter: drop-shadow(0 0 3px rgba(255,50,20,0.65)); }
  .kr9-screen.kr9-mouth-quiet .kr9-mouth{ opacity: 0.6; }
  .kr9-screen.kr9-mouth-quiet .kr9-mouth svg{ transform: scale(0.82); transform-origin: 50% 0; }
  .kr9-caption.kr9-caption-rage{ color: #ff4530; text-shadow: 0 0 8px rgba(255,40,20,0.6); }
  .kr9-cooldown-note{
    margin-top: 4px; font-size: 10.5px; color: #ff4530; text-align:center;
    letter-spacing: 0.04em; opacity: 0; transition: opacity 0.2s ease; min-height: 14px;
  }
  .kr9-cooldown-note.on{ opacity: 0.9; }
  .kr9-blush{
    position: absolute; width: 18px; height: 11px; border-radius: 50%;
    background: var(--rust); opacity: 0; pointer-events: none;
    box-shadow: 0 0 9px rgba(181,80,46,0.6);
    transition: opacity 0.3s ease;
  }
  .kr9-blush--l{ left: 20px; bottom: 14px; }
  .kr9-blush--r{ right: 20px; bottom: 14px; }
  .kr9-screen.kr9-blush-on .kr9-blush{ opacity: 0.65; }
  @keyframes kr9Flicker{
    0%{ filter: brightness(2.6); } 15%{ filter: brightness(0.55); }
    30%{ filter: brightness(1.9); } 50%{ filter: brightness(0.75); }
    100%{ filter: brightness(1); }
  }
  .kr9-flicker{ animation: kr9Flicker 0.35s steps(2, end); }
  .kr9-bottombar{ display:flex; align-items:center; gap: 10px; margin-top: 12px; }
  .kr9-bolt{ width:8px; height:8px; border-radius:50%; background:#171310; border:1px solid #6b5842; }
  .kr9-grille{ flex:1; height:8px; background-image: repeating-linear-gradient(90deg, #171310 0 2px, transparent 2px 4px); opacity:0.8; }
  .kr9-warn{ color: var(--amber); font-size:11px; opacity:0.8; }
  .kr9-skull{ color: var(--text-muted); font-size:11px; }
  .kr9-led{ width:8px; height:8px; border-radius:50%; background: var(--toxic); box-shadow: 0 0 6px var(--toxic); }
  .kr9-caption{
    margin-top: 18px; font-family: var(--font-body); font-size: 14px; color: var(--amber);
    text-align:center; min-height: 20px; max-width: 300px; transition: opacity 0.15s ease;
  }
  .kr9-hint{ margin-top: 6px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; text-align:center; }

  /* ---------- residents gallery widget ---------- */
  .res-wrap{ margin: 34px 0 8px; clear: both; animation: fadeUp 0.4s ease both; }
  .res-frame{
    display: flex; gap: 22px; align-items: flex-start;
    background: var(--panel); border: 1px solid var(--border);
    padding: 20px;
  }
  @media (max-width: 600px){
    .res-frame{ flex-direction: column; align-items: center; text-align: center; }
  }
  .res-portrait{ flex: 0 0 auto; width: 140px; }
  .res-portrait svg{ width: 100%; height: auto; display: block; border: 1px solid var(--border-soft); background: #14120f; }
  .res-body{ flex: 1 1 auto; min-width: 0; }
  .res-role{
    font-family: var(--font-display); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--rust); margin-bottom: 5px;
  }
  .res-name{
    font-family: var(--font-display); font-weight: 600; font-size: 20px; letter-spacing: 0.03em;
    text-transform: uppercase; color: var(--amber); margin-bottom: 12px;
  }
  .res-bio{ font-size: 13px; line-height: 1.75; color: var(--text); opacity: 0.92; margin-bottom: 14px; }
  .res-quote{
    font-size: 13px; color: var(--amber); border-left: 2px solid var(--rust);
    padding-left: 12px; line-height: 1.6;
  }
  .res-frame.res-flicker{ animation: kr9Flicker 0.35s steps(2, end); }
  .res-controls{ display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .res-btn{
    background: var(--bg-void); border: 1px solid var(--border-soft); color: var(--text-muted);
    font-family: var(--font-display); font-size: 11.5px; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 9px 14px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .res-btn:hover{ color: var(--amber); border-color: var(--rust); transform: translateY(-1px); }
  .res-btn:active{ transform: translateY(0); }
  .res-btn-primary{ background: var(--rust); border-color: var(--rust); color: #14120f; }
  .res-btn-primary:hover{ background: var(--amber); border-color: var(--amber); color: #14120f; }
  .res-counter{ font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-left: auto; }
  @media (max-width: 600px){ .res-counter{ margin-left: 0; width: 100%; text-align: center; } }

  /* ---------- print / PDF ---------- */
  @media print{
    body{ background: #fff !important; color: #111 !important; animation: none !important; }
    .sidebar, .mobile-bar, .sidebar-backdrop, .progress-bar, .to-top-btn,
    .exit-reading-btn, .modal-overlay, .breadcrumbs, .bookmark-star, .print-btn,
    .custom-tag, .del-btn, .article-owner-actions, .see-also, .toolbar-row, .kr9-wrap, .res-wrap{
      display: none !important;
    }
    .app{ display: block !important; }
    .main{ padding: 0 !important; }
    .scene{ max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
    .article-title, .article-meta, .article-summary, .article-body, .infobox-head{ color: #111 !important; }
    .article-summary{ border-left-color: #888 !important; }
    .infobox{ border-color: #999 !important; background: #f4f4f4 !important; }
    .article-banner{ display: none !important; }
    .diagram-wrap{ break-inside: avoid; }
    a, .wiki-link{ color: #111 !important; border-bottom: none !important; }
  }
</style>
</head>

  <button class="burger" id="burgerBtn" aria-label="Открыть меню">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-brand" id="mobileBrand">Обратный отсчёт до Земли</div>

function kr9PlayRageSound(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;
    const ctx = new Ctx();
    const master = ctx.createGain();
    master.gain.value = 0.0001;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.08);

    // low growling oscillator, detuned for a harsh beat
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = 58;
    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = 61;

    // slow LFO wobbling the pitch for a "growl"
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 6.5;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 14;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);
    lfoGain.connect(osc2.frequency);

    // harsh distortion via waveshaper
    const shaper = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for(let i=0;i<256;i++){
      const x = (i/255)*2-1;
      curve[i] = Math.tanh(x*6);
    }
    shaper.curve = curve;
    shaper.oversample = '4x';

    // noise layer for static/hiss
    const bufferSize = ctx.sampleRate * 2;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * 0.35;
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1800;
    const noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.12;

    osc1.connect(shaper);
    osc2.connect(shaper);
    shaper.connect(master);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(master);

    osc1.start();
    osc2.start();
    lfo.start();
    noise.start();

    return { ctx, nodes: [osc1, osc2, lfo, noise], master };
  } catch(e){
    return null;
  }
}

function kr9StopRageSound(handle){
  if(!handle) return;
  const { ctx, nodes, master } = handle;
  try{
    master.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.06);
    setTimeout(() => {
      nodes.forEach(n => { try{ n.stop(); }catch(e){} });
      ctx.close();
    }, 250);
  } catch(e){}
}

function attachKR9Handlers(){
  const frame = document.getElementById('kr9Frame');
  if(!frame) return;
  let current = 0;
  let rageActive = false;
  let rageSoundHandle = null;
  let rageTimeoutId = null;
  const clickTimestamps = [];
  const RAGE_CLICK_THRESHOLD = 6;   // clicks
  const RAGE_WINDOW_MS = 3000;      // within this window
  const RAGE_DURATION_MS = 4500;    // how long the rage lasts
  const GLARE_STARE_MS = 1300;      // how long he silently glares before turning away
  const GLARE_TURN_MS = 2000;       // how long he stays turned away

  const cooldownNote = () => document.getElementById('kr9CooldownNote');

  const enterRage = () => {
    if(rageActive) return;
    rageActive = true;
    frame.classList.add('kr9-rage');
    const screen = document.getElementById('kr9Screen');
    if(screen) screen.classList.add('kr9-mouth-on');
    const cap = document.getElementById('kr9Caption');
    if(cap){
      const phrase = KR9_RAGE_PHRASES[Math.floor(Math.random() * KR9_RAGE_PHRASES.length)];
      cap.textContent = '«' + phrase + '»';
      cap.classList.add('kr9-caption-rage');
    }
    ['kr9EyeL', 'kr9EyeR'].forEach(elId => {
      const el = document.getElementById(elId);
      if(el) el.className = 'kr9-eye kr9-eye--furious';
    });
    const note = cooldownNote();
    if(note){ note.textContent = 'KR-9 ПЕРЕГРУЖЕН — ПОДОЖДИТЕ'; note.classList.add('on'); }
    rageSoundHandle = kr9PlayRageSound();
    frame.setAttribute('aria-disabled', 'true');

    rageTimeoutId = setTimeout(exitRage, RAGE_DURATION_MS);
  };

  const exitRage = () => {
    rageActive = false;
    clickTimestamps.length = 0;
    frame.classList.remove('kr9-rage');
    frame.removeAttribute('aria-disabled');
    const screen = document.getElementById('kr9Screen');
    if(screen) screen.classList.remove('kr9-mouth-on');
    const cap = document.getElementById('kr9Caption');
    if(cap) cap.classList.remove('kr9-caption-rage');
    const note = cooldownNote();
    if(note) note.classList.remove('on');
    kr9StopRageSound(rageSoundHandle);
    rageSoundHandle = null;
    // settle back to a neutral-ish state
    const state = KR9_STATES[0];
    ['kr9EyeL', 'kr9EyeR'].forEach(elId => {
      const el = document.getElementById(elId);
      if(el) el.className = 'kr9-eye ' + state.cls;
    });
    if(cap) cap.textContent = '«...сброс произведён. Продолжаю наблюдение.»';
  };

  const enterGlare = () => {
    if(rageActive) return;
    rageActive = true;
    frame.classList.add('kr9-glare');
    const screen = document.getElementById('kr9Screen');
    if(screen) screen.classList.add('kr9-mouth-on', 'kr9-mouth-quiet');
    const cap = document.getElementById('kr9Caption');
    if(cap){
      const phrase = KR9_GLARE_PHRASES[Math.floor(Math.random() * KR9_GLARE_PHRASES.length)];
      cap.textContent = '«' + phrase + '»';
      cap.classList.add('kr9-caption-rage');
    }
    ['kr9EyeL', 'kr9EyeR'].forEach(elId => {
      const el = document.getElementById(elId);
      if(el) el.className = 'kr9-eye kr9-eye--glare';
    });
    const note = cooldownNote();
    if(note){ note.textContent = 'KR-9 МОЛЧА СМОТРИТ НА ВАС'; note.classList.add('on'); }
    frame.setAttribute('aria-disabled', 'true');
    // no sound this time — he just stares, then turns away

    rageTimeoutId = setTimeout(() => {
      frame.classList.add('kr9-turn-away');
      const screen2 = document.getElementById('kr9Screen');
      if(screen2) screen2.classList.remove('kr9-mouth-on', 'kr9-mouth-quiet');
      rageTimeoutId = setTimeout(exitGlare, GLARE_TURN_MS);
    }, GLARE_STARE_MS);
  };

  const exitGlare = () => {
    rageActive = false;
    clickTimestamps.length = 0;
    frame.classList.remove('kr9-glare', 'kr9-turn-away');
    frame.removeAttribute('aria-disabled');
    const screen = document.getElementById('kr9Screen');
    if(screen) screen.classList.remove('kr9-mouth-on', 'kr9-mouth-quiet');
    const cap = document.getElementById('kr9Caption');
    if(cap) cap.classList.remove('kr9-caption-rage');
    const note = cooldownNote();
    if(note) note.classList.remove('on');
    const state = KR9_STATES[0];
    ['kr9EyeL', 'kr9EyeR'].forEach(elId => {
      const el = document.getElementById(elId);
      if(el) el.className = 'kr9-eye ' + state.cls;
    });
    if(cap) cap.textContent = '«...ладно. Продолжаю наблюдение.»';
  };

  const react = () => {
    let next = Math.floor(Math.random() * KR9_STATES.length);
    if(next === current && KR9_STATES.length > 1) next = (next + 1) % KR9_STATES.length;
    current = next;
    const state = KR9_STATES[current];
    const phrase = state.phrases[Math.floor(Math.random() * state.phrases.length)];
    ['kr9EyeL', 'kr9EyeR'].forEach(elId => {
      const el = document.getElementById(elId);
      if(el) el.className = 'kr9-eye ' + state.cls;
    });
    const cap = document.getElementById('kr9Caption');
    if(cap){
      cap.style.opacity = '0';
      setTimeout(() => { cap.textContent = '«' + phrase + '»'; cap.style.opacity = '1'; }, 120);
    }
    const screen = document.getElementById('kr9Screen');
    if(screen){
      screen.classList.remove('kr9-flicker');
      void screen.offsetWidth;
      screen.classList.add('kr9-flicker');
      screen.classList.toggle('kr9-blush-on', !!state.blush);
    }
  };

  const handleActivate = () => {
    if(rageActive) return; // ignore input while enraged
    const now = Date.now();
    clickTimestamps.push(now);
    while(clickTimestamps.length && now - clickTimestamps[0] > RAGE_WINDOW_MS){
      clickTimestamps.shift();
    }
    if(clickTimestamps.length >= RAGE_CLICK_THRESHOLD){
      if(Math.random() < 0.5){ enterGlare(); } else { enterRage(); }
      return;
    }
    react();
  };

  frame.addEventListener('click', handleActivate);
  frame.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); handleActivate(); }
  });
}

function residentCardInnerHTML(r){
  const districtName = getDistrictName(r.district);
  return `
    <div class="res-portrait" id="resPortrait">${residentPortraitSVG(r)}</div>
    <div class="res-body">
      <div class="res-role">${r.role}${districtName ? ' · ' + districtName : ''}</div>
      <div class="res-name">${r.name}</div>
      <p class="res-bio">${resolveLinks(r.bio, allArticles())}</p>
      <p class="res-quote">«${r.quote}»</p>
    </div>`;
}

function residentsWidgetHTML(){
  const startIdx = Math.floor(Math.random() * RESIDENTS.length);
  return `
  <div class="res-wrap">
    <div class="res-frame" id="resFrame">
      ${residentCardInnerHTML(RESIDENTS[startIdx])}
    </div>
    <div class="res-controls">
      <button class="res-btn" id="resPrevBtn" title="Предыдущая карточка">◀ Пред.</button>
      <button class="res-btn res-btn-primary" id="resRandomBtn" title="Случайный житель">⚄ Случайный житель</button>
      <button class="res-btn" id="resNextBtn" title="Следующая карточка">След. ▶</button>
      <span class="res-counter" id="resCounter"></span>
    </div>
  </div>`;
}

function attachResidentsHandlers(){
  const frame = document.getElementById('resFrame');
  if(!frame) return;
  const counter = document.getElementById('resCounter');

  // recover which resident is currently shown by matching rendered name
  const nameEl = frame.querySelector('.res-name');
  let idx = Math.max(0, RESIDENTS.findIndex(r => nameEl && r.name === nameEl.textContent));
  if(idx < 0) idx = 0;

  const render = (nextIdx) => {
    idx = ((nextIdx % RESIDENTS.length) + RESIDENTS.length) % RESIDENTS.length;
    frame.innerHTML = residentCardInnerHTML(RESIDENTS[idx]);
    attachLinkHandlers(frame);
    frame.classList.remove('res-flicker');
    void frame.offsetWidth;
    frame.classList.add('res-flicker');
    if(counter) counter.textContent = 'Житель ' + (idx + 1) + ' из ' + RESIDENTS.length;
  };

  document.getElementById('resPrevBtn').addEventListener('click', () => render(idx - 1));
  document.getElementById('resNextBtn').addEventListener('click', () => render(idx + 1));
  document.getElementById('resRandomBtn').addEventListener('click', () => {
    let next = Math.floor(Math.random() * RESIDENTS.length);
    if(next === idx && RESIDENTS.length > 1) next = (next + 1) % RESIDENTS.length;
    render(next);
  });

  attachLinkHandlers(frame);
  if(counter) counter.textContent = 'Житель ' + (idx + 1) + ' из ' + RESIDENTS.length;
}

// ---------- state ----------
let customArticles = {};
let currentId = null;
let searchQuery = '';
let bookmarks = new Set();

// ---------- storage: статьи хранятся в Supabase (общая база для всех посетителей) ----------
// Чтение таблицы 'articles' разрешено всем (RLS: select для anon).
// Запись/удаление разрешены только авторизованным пользователям (RLS: insert/update/delete для authenticated).
async function loadCustom(){
  if(!supabaseClient){ customArticles = {}; return; }
  try{
    const { data, error } = await supabaseClient.from('articles').select('*');
    if(error) throw error;
    customArticles = {};
    (data || []).forEach(row => {
      customArticles[row.id] = {
        category: row.category,
        title: row.title,
        summary: row.summary,
        info: row.info || {},
        body: row.body || [],
        links: row.links || []
      };
    });
  }catch(e){
    console.error('Не удалось загрузить статьи из Supabase', e);
    customArticles = {};
  }
}
async function saveArticle(id, article){
  if(!supabaseClient) throw new Error('Supabase не настроен');
  const { error } = await supabaseClient.from('articles').upsert({
    id,
    category: article.category,
    title: article.title,
    summary: article.summary,
    info: article.info || {},
    body: article.body || [],
    links: article.links || []
  });
  if(error) throw error;
}
async function deleteArticleRemote(id){
  if(!supabaseClient) throw new Error('Supabase не настроен');
  const { error } = await supabaseClient.from('articles').delete().eq('id', id);
  if(error) throw error;
}

// ---------- bookmarks / theme: личные настройки, хранятся локально в браузере ----------
function loadBookmarks(){
  try{
    const raw = localStorage.getItem('mw-bookmarks');
    bookmarks = new Set(raw ? JSON.parse(raw) : []);
  }catch(e){
    bookmarks = new Set();
  }
}
function saveBookmarks(){
  try{
    localStorage.setItem('mw-bookmarks', JSON.stringify([...bookmarks]));
  }catch(e){
    console.error('Не удалось сохранить закладки', e);
  }
}
function toggleBookmark(id){
  if(bookmarks.has(id)) bookmarks.delete(id); else bookmarks.add(id);
  saveBookmarks();
}

function loadTheme(){
  let theme = 'dark';
  try{ theme = localStorage.getItem('mw-theme') || 'dark'; }catch(e){}
  applyTheme(theme);
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggleBtn');
  if(btn) btn.textContent = theme === 'light' ? '☀' : '☾';
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyTheme(next);
  try{ localStorage.setItem('mw-theme', next); }catch(e){}
}

function allArticles(){
  return Object.assign({}, CORE_ARTICLES, customArticles);
}

// ---------- rendering ----------
function highlightMatch(text, q){
  if(!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if(idx === -1) return text;
  return text.slice(0, idx) + '<mark class="search-hit">' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function renderNav(){
  const groupsOrder = ['Хронология', 'Места', 'Вера и общество', 'Прочее'];
  const arts = allArticles();
  const q = searchQuery.trim().toLowerCase();

  const byGroup = {};
  Object.entries(arts).forEach(([id, a]) => {
    if(q && !(a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q))) return;
    if(!byGroup[a.category]) byGroup[a.category] = [];
    byGroup[a.category].push([id, a]);
  });

  const nav = document.getElementById('navGroups');
  nav.innerHTML = '';
  let any = false;

  const bookmarkedEntries = [...bookmarks]
    .map(id => [id, arts[id]])
    .filter(([id, a]) => a && (!q || a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q)));
  if(bookmarkedEntries.length){
    any = true;
    const div = document.createElement('div');
    div.className = 'nav-group';
    const title = document.createElement('div');
    title.className = 'nav-group-title';
    title.textContent = 'Закладки';
    div.appendChild(title);
    bookmarkedEntries.forEach(([id, a]) => {
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (id === currentId ? ' active' : '');
      btn.innerHTML = '★ ' + highlightMatch(a.title, q);
      btn.addEventListener('click', () => showArticle(id));
      div.appendChild(btn);
    });
    nav.appendChild(div);
  }

  groupsOrder.forEach(g => {
    if(!byGroup[g]) return;
    any = true;
    const div = document.createElement('div');
    div.className = 'nav-group';
    const title = document.createElement('div');
    title.className = 'nav-group-title';
    title.textContent = g;
    div.appendChild(title);
    byGroup[g].forEach(([id, a]) => {
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (id === currentId ? ' active' : '');
      btn.innerHTML = highlightMatch(a.title, q);
      btn.addEventListener('click', () => showArticle(id));
      div.appendChild(btn);
    });
    nav.appendChild(div);
  });
  if(!any){
    const note = document.createElement('div');
    note.className = 'empty-note';
    note.textContent = 'Ничего не найдено.';
    nav.appendChild(note);
  }
}

function attachDistrictMap(scene){
  const infoBox = scene.querySelector('#districtInfo');
  if(!infoBox) return;
  const arts = allArticles();
  const shapes = scene.querySelectorAll('.district-shape');

  function selectDistrict(id){
    const d = DISTRICTS.find(x => x.id === id);
    if(!d) return;
    shapes.forEach(s => s.classList.toggle('active', s.getAttribute('data-district') === id));
    infoBox.classList.add('has-selection');
    infoBox.innerHTML = `
      <div class="di-head">
        <span class="di-name">${d.name}</span>
        <span class="di-kind">${d.kind}</span>
      </div>
      <div class="di-desc">${resolveLinks(d.desc, arts)}</div>
      ${arts['gorod-rynok'] ? `<button class="di-link" data-goto="gorod-rynok">Читать про Город-Рынок целиком →</button>` : ''}
    `;
    infoBox.querySelectorAll('[data-goto]').forEach(el => {
      el.addEventListener('click', () => showArticle(el.getAttribute('data-goto')));
    });
  }

  shapes.forEach(shape => {
    shape.addEventListener('click', () => selectDistrict(shape.getAttribute('data-district')));
  });
}

function resolveLinks(text, arts){
  let out = text.replace(/\{\{(.*?)\}\}/g, (m, inner) => {
    const [id, custom] = inner.split('|');
    const a = arts[id];
    if(!a) return m;
    return `<button class="wiki-link" data-goto="${id}">${custom || a.title}</button>`;
  });
  out = out.replace(/статус: (утеряно|искажено)/gi, (m, status) =>
    `<span class="lost-tag lost-tag--${status.toLowerCase()}">статус: ${status}</span>`
  );
  return out;
}

function attachLinkHandlers(container){
  container.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => showArticle(el.getAttribute('data-goto')));
  });
}

        ${Array.from({length:8}).map((_,j)=>{const a=j*45*Math.PI/180;return `<line x1="${x+sw/2+14*Math.cos(a)}" y1="${y+sh/2+14*Math.sin(a)}" x2="${x+sw/2+26*Math.cos(a)}" y2="${y+sh/2+26*Math.sin(a)}" stroke="#d9a441" stroke-width="1.5" opacity="0.5"/>`}).join('')}`;

function crossfadeScene(renderFn){
  const scene = document.getElementById('scene');
  scene.classList.add('scene-fading');
  window.setTimeout(() => {
    renderFn(scene);
    requestAnimationFrame(() => {
      scene.classList.remove('scene-fading');
    });
  }, 180);
}

function animateCounters(scene){
  scene.querySelectorAll('.stat-num').forEach(el => {
    const target = parseInt(el.getAttribute('data-count'), 10) || 0;
    const duration = 900;
    const start = performance.now();
    function tick(now){
      const p = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(eased * target);
      if(p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function estimateReadingMinutes(a){
  const text = [a.summary, ...(a.body || []), ...Object.values(a.info || {})].join(' ');
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 180));
}

// ---------- загрузка картинок в Supabase Storage (бакет 'article-images') ----------
async function uploadImage(file){
  if(!supabaseClient) throw new Error('Supabase не настроен');
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
  const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await supabaseClient.storage.from('article-images').upload(path, file, {
    cacheControl: '3600',
    upsert: false
  });
  if(error) throw error;
  const { data } = supabaseClient.storage.from('article-images').getPublicUrl(path);
  return data.publicUrl;
}

const fImageInput = document.getElementById('fImageInput');
const insertImageBtn = document.getElementById('insertImageBtn');
const imgUploadStatus = document.getElementById('imgUploadStatus');

insertImageBtn.addEventListener('click', () => {
  if(!currentUser){
    alert('Нужно войти как автор, чтобы добавлять картинки.');
    return;
  }
  fImageInput.click();
});

fImageInput.addEventListener('change', async () => {
  const file = fImageInput.files[0];
  if(!file) return;
  insertImageBtn.disabled = true;
  imgUploadStatus.textContent = 'Загрузка…';
  try{
    const url = await uploadImage(file);
    const textarea = document.getElementById('fContent');
    const marker = `[img:${url}]`;
    const start = textarea.selectionStart ?? textarea.value.length;
    const end = textarea.selectionEnd ?? textarea.value.length;
    const before = textarea.value.slice(0, start);
    const after = textarea.value.slice(end);
    const needsNewlineBefore = before.length && !before.endsWith('\n');
    const needsNewlineAfter = after.length && !after.startsWith('\n');
    const insertText = (needsNewlineBefore ? '\n' : '') + marker + (needsNewlineAfter ? '\n' : '\n');
    textarea.value = before + insertText + after;
    const caret = (before + insertText).length;
    textarea.focus();
    textarea.setSelectionRange(caret, caret);
    imgUploadStatus.textContent = 'Картинка вставлена.';
  }catch(e){
    imgUploadStatus.textContent = '';
    alert('Не удалось загрузить картинку: ' + e.message);
  }finally{
    insertImageBtn.disabled = false;
    fImageInput.value = '';
  }
});

document.getElementById('saveAdd').addEventListener('click', async () => {

    alert('Нужно войти как автор, чтобы добавлять или редактировать статьи.');

  }
  const title = document.getElementById('fTitle').value.trim();
  const category = document.getElementById('fCategory').value;
  const summary = document.getElementById('fSummary').value.trim();
  const content = document.getElementById('fContent').value.trim();
  if(!title || !content){
    alert('Заполните хотя бы название и текст статьи.');
    return;
  }

  const isEditing = !!editingId;
  const id = isEditing ? editingId : ('custom-' + title.toLowerCase()
    .replace(/[^a-zа-яё0-9]+/gi, '-')
    .replace(/^-+|-+$/g, '') + '-' + Date.now().toString(36));

  const existing = isEditing ? allArticles()[editingId] : null;

  const article = {
    category,
    title,
    summary: summary || 'Запись без описания.',
    info: (existing && existing.info) || {},
    body: content.split('\n').filter(l => l.trim()),
    links: (existing && existing.links) || []
  };
  try{
    await saveArticle(id, article);
  }catch(e){
    alert('Не удалось сохранить статью: ' + e.message);
    return;
  }
  customArticles[id] = article;
  editingId = null;
  resetModalForm();
  overlay.classList.remove('open');
  showArticle(id);
});

  currentUser = data.user;
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  loginOverlay.classList.remove('open');
  updateAuthUI();
});

logoutBtn.addEventListener('click', async () => {
  if(supabaseClient) await supabaseClient.auth.signOut();
  currentUser = null;
  updateAuthUI();
  if(currentId) showArticle(currentId, false);
});

// ---------- search ----------
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderNav();
});

// ---------- search hotkey ("/") ----------
document.addEventListener('keydown', (e) => {
  if(e.key !== '/') return;
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  e.preventDefault();
  const box = document.getElementById('searchBox');
  if(window.innerWidth <= 860) openSidebar();
  box.focus();
});

// ---------- reading progress + back to top ----------
const progressBar = document.getElementById('progressBar');
const toTopBtn = document.getElementById('toTopBtn');

function updateReadingProgress(){
  if(currentId === null){
    progressBar.style.width = '0%';
    return;
  }
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? Math.min(100, Math.max(0, (scrollTop / docHeight) * 100)) : 0;
  progressBar.style.width = pct + '%';
}

window.addEventListener('scroll', () => {
  updateReadingProgress();
  toTopBtn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

toTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ---------- mobile menu ----------
const burgerBtn = document.getElementById('burgerBtn');
const sidebar = document.querySelector('.sidebar');
const backdrop = document.getElementById('sidebarBackdrop');

function openSidebar(){
  sidebar.classList.add('open');
  backdrop.classList.add('open');
  burgerBtn.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSidebar(){
  sidebar.classList.remove('open');
  backdrop.classList.remove('open');
  burgerBtn.classList.remove('active');
  document.body.style.overflow = '';
}
burgerBtn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
backdrop.addEventListener('click', closeSidebar);
document.getElementById('mobileBrand').addEventListener('click', () => { showHero(); closeSidebar(); });

// close sidebar on nav item click (mobile)
document.getElementById('navGroups').addEventListener('click', () => {
  if(window.innerWidth <= 860) closeSidebar();
});

// ---------- brand ----------
document.getElementById('brandLink').addEventListener('click', () => { showHero(); closeSidebar(); });

// ---------- browser back/forward ----------
window.addEventListener('popstate', (e) => {
  const state = e.state;
  if(!state || state.view === 'hero'){
    showHero(false);
  } else if(state.view === 'article'){
    showArticle(state.id, false);
  }
  if(window.innerWidth <= 860) closeSidebar();
});

// ---------- theme toggle ----------
document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

// ---------- random article ----------
document.getElementById('randomBtn').addEventListener('click', () => {
  const arts = allArticles();
  const ids = Object.keys(arts).filter(id => id !== currentId);
  if(!ids.length) return;
  const pick = ids[Math.floor(Math.random() * ids.length)];
  showArticle(pick);
  if(window.innerWidth <= 860) closeSidebar();
});

// ---------- reading mode ----------
function setReadingMode(on){
  document.body.classList.toggle('reading-mode', on);
  const btn = document.getElementById('readingModeBtn');
  if(btn) btn.classList.toggle('active', on);
}
document.getElementById('readingModeBtn').addEventListener('click', () => {
  setReadingMode(!document.body.classList.contains('reading-mode'));
});
document.getElementById('exitReadingBtn').addEventListener('click', () => setReadingMode(false));

// ---------- init ----------
(async function init(){
  await initAuth();
  await loadCustom();
  loadBookmarks();
  loadTheme();
  // Restore whatever article the URL hash points to (so refresh / direct link works)
  const hashId = decodeURIComponent(location.hash.replace(/^#/, ''));
  const arts = allArticles();
  if(hashId && arts[hashId]){
    history.replaceState({ view: 'article', id: hashId }, '', '#' + encodeURIComponent(hashId));
    showArticle(hashId, false);
  } else {
    history.replaceState({ view: 'hero' }, '', '#');
    showHero(false);
  }
})();
</script>
</body>
</html>
